<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaylord Salvados - Meli</title>
    <link rel="icon" type="image/svg+xml"
        href="https://http2.mlstatic.com/frontend-assets/ui-navigation/5.19.5/mercadolibre/favicon.svg">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/etiqueta-shared.css">
    <link rel="stylesheet" href="../css/gaylord.css">

    <script src="../libs/qrcode.min.js"></script>
    <script src="../js/gaylord.js" defer></script>
</head>

<body>
    <header class="kraken-nav-header no-print">
        <div class="header-content">
            <div class="logo-container">
                <a href="../index.html">
                    <img src="https://http2.mlstatic.com/frontend-assets/ui-navigation/5.19.5/mercadolibre/logo__large_plus.png"
                        class="logo-img" alt="Mercado Livre">
                </a>
            </div>
        </div>
    </header>

    <div class="master-container">
        <div class="input-panel no-print">
            <h2>Gaylord Salvados</h2>
            <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Gerar etiquetas de identificação para
                Gaylords.</p>

            <div class="input-group">
                <label>Facility</label>
                <input type="text" id="in-facility" placeholder="Ex: BRSP05" value="BRSP05"
                    oninput="this.value = this.value.toUpperCase()">
            </div>

            <div class="input-group">
                <label>Número do Gaylord</label>
                <input type="number" id="in-start" value="1" min="1">
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="gerarEtiquetas()"
                    style="width: 100%; padding: 18px; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 8px; background-color: #3483fa; color: white; border: none;">
                    GERAR E IMPRIMIR
                </button>
            </div>

            <div style="margin-top: 20px; font-size: 12px; color: #888;">
                * As etiquetas serão geradas sequencialmente.<br>
                * Formato: FACILITY_NUMERO<br>
            </div>
        </div>

        <div class="label-view-area">
            <div id="print-container"></div>
        </div>
    </div>
</body>

</html>
